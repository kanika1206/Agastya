<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Violations — AGASTYA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700&family=Archivo:wght@400;500;600;700;800&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="agastya.css">
<style>
  .filters{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;align-items:end;}
  .pager{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 4px;flex-wrap:wrap;}
  .pgbtn{font-family:var(--mono);font-size:12px;padding:7px 14px;border:1px solid var(--line-2);border-radius:var(--r-sm);background:#fff;cursor:pointer;}
  .pgbtn[disabled]{opacity:.35;cursor:not-allowed;}
  @media(max-width:1000px){.filters{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div class="ag-shell">
  <div data-ag-header></div>

  <section class="ag-section">
    <div class="ag-folio" data-reveal>
      <span class="num">02 · RECORDS</span><span class="name">Violations</span><span class="rule"></span>
      <span class="aside" id="count">—</span>
    </div>

    <div class="panel" data-reveal style="margin-bottom:14px;">
      <div class="panel-head"><span class="label" style="letter-spacing:1.4px;">Filters</span><a href="#" id="clear" class="label" style="color:var(--red);text-decoration:none;">clear all ✕</a></div>
      <form id="filters" class="filters" style="padding:13px 16px;">
        <div class="field"><label>Type</label><select class="input" name="violation_type" id="fType"><option value="">All types</option></select></div>
        <div class="field"><label>Plate</label><input class="input" name="plate" id="fPlate" placeholder="KA01…"></div>
        <div class="field"><label>Camera ID</label><input class="input" name="camera_id" id="fCam" placeholder="cam_…"></div>
        <div class="field"><label>Min conf.</label><input class="input" name="min_confidence" id="fMin" type="number" step="0.01" min="0" max="1" placeholder="0.00"></div>
        <div class="field"><label>Sort</label><select class="input" name="sort" id="fSort"><option value="newest">Newest</option><option value="oldest">Oldest</option></select></div>
        <div class="field"><label>&nbsp;</label><button type="submit" class="btn btn-red btn-sm" style="justify-content:center;">Apply</button></div>
      </form>
    </div>

    <div class="panel" data-reveal>
      <div class="panel-head"><span class="label" style="letter-spacing:1.4px;">Signed records</span><span class="label" id="rangeTop">—</span></div>
      <div style="overflow-x:auto;max-height:64vh;">
        <table class="ledger">
          <thead><tr><th></th><th>ID</th><th>Type</th><th>Tier</th><th>Conf.</th><th>Plate</th><th>Camera</th><th>Captured</th><th></th></tr></thead>
          <tbody id="rows"><tr><td colspan="9" class="ag-empty">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>

    <div class="pager">
      <span class="label" id="rangeLbl">—</span>
      <div style="display:flex;gap:10px;align-items:center;">
        <button class="pgbtn" id="prev">← Prev</button>
        <span class="label" id="pageLbl">—</span>
        <button class="pgbtn" id="next">Next →</button>
      </div>
    </div>
  </section>

  <div data-ag-footer></div>
</div>

<script src="agastya.js"></script>
<script>
(function(){
  var A=window.AGASTYA, F=A.fmt, LIMIT=12;
  A.chrome.mount('violations');

  // populate type select
  var sel=document.getElementById('fType');
  Object.keys(A.cfg.VT).forEach(function(k){
    var o=document.createElement('option'); o.value=k; o.textContent=F.vtLabel(k)+(F.isLive(k)?'':' (sim)'); sel.appendChild(o);
  });

  // state from URL
  var url=new URLSearchParams(location.search);
  var state={
    violation_type:url.get('violation_type')||'',
    plate:url.get('plate')||'',
    camera_id:url.get('camera_id')||'',
    min_confidence:url.get('min_confidence')||'',
    sort:url.get('sort')||'newest',
    offset:parseInt(url.get('offset')||'0',10)||0,
  };
  // hydrate form
  document.getElementById('fType').value=state.violation_type;
  document.getElementById('fPlate').value=state.plate;
  document.getElementById('fCam').value=state.camera_id;
  document.getElementById('fMin').value=state.min_confidence;
  document.getElementById('fSort').value=state.sort;

  function syncUrl(){
    var u=new URLSearchParams();
    ['violation_type','plate','camera_id','min_confidence','sort'].forEach(function(k){ if(state[k])u.set(k,state[k]); });
    if(state.offset)u.set('offset',state.offset);
    history.replaceState(null,'',location.pathname+(u.toString()?'?'+u:''));
  }

  function load(){
    var tb=document.getElementById('rows');
    tb.innerHTML='<tr><td colspan="9" class="ag-empty">Loading…</td></tr>';
    var p={limit:LIMIT,offset:state.offset,sort:state.sort};
    ['violation_type','plate','camera_id','min_confidence'].forEach(function(k){ if(state[k])p[k]=state[k]; });
    A.api.violations(p).then(function(r){
      var rows=r.data||[], meta=r.meta||{total:rows.length,limit:LIMIT,offset:state.offset};
      document.getElementById('count').textContent=F.n(meta.total)+' records';
      render(rows);
      pager(meta);
    }).catch(function(){
      A.chrome.offline();
      tb.innerHTML='<tr><td colspan="9" class="ag-error">Backend unreachable — start API on '+A.cfg.base+'</td></tr>';
    });
  }

  function render(rows){
    var tb=document.getElementById('rows');
    if(!rows.length){ tb.innerHTML='<tr><td colspan="9" class="ag-empty">No records match these filters.</td></tr>'; return; }
    tb.innerHTML=rows.map(function(v){
      var tier=F.vtTier(v.violation_type), c=F.tierColor(tier);
      var q='detail.html?id='+v.id+'&type='+encodeURIComponent(v.violation_type)+'&conf='+v.confidence+'&plate='+encodeURIComponent(v.plate||'')+'&cam='+encodeURIComponent(v.camera_id||'');
      return '<tr onclick="location.href=\''+q+'\'">'+
        '<td style="width:52px;padding-right:0;"><img src="assets/violations/'+v.violation_type+'.jpg" alt="" loading="lazy" onerror="this.style.visibility=\'hidden\'" style="width:44px;height:33px;object-fit:cover;border-radius:4px;border:1px solid var(--line-2);display:block;"></td>'+
        '<td class="mono">#'+v.id+'</td>'+
        '<td>'+F.vtLabel(v.violation_type)+(F.isLive(v.violation_type)?'':' <span class="chip" style="font-size:8px;padding:1px 6px;border-color:'+c+';color:'+c+';">sim</span>')+'</td>'+
        '<td><span class="chip" style="border-color:'+c+';color:'+c+';">'+F.tierLabel(tier)+'</span></td>'+
        '<td class="mono" style="color:'+F.confColor(v.confidence)+';font-weight:600;">'+Math.round(v.confidence*100)+'%</td>'+
        '<td class="mono">'+(v.plate||'—')+'</td>'+
        '<td class="mono ag-hide-sm">'+(v.camera_id||'—')+'</td>'+
        '<td class="mono ag-hide-sm" style="color:var(--ink-4);">'+F.dateTime(v.captured_at||v.created_at)+'</td>'+
        '<td style="text-align:right;color:var(--ink-4);">›</td>'+
      '</tr>';
    }).join('');
  }

  function pager(meta){
    var total=meta.total||0, off=meta.offset||0, lim=meta.limit||LIMIT;
    var from=total?off+1:0, to=Math.min(off+lim,total);
    document.getElementById('rangeLbl').textContent='showing '+from+'–'+to+' of '+F.n(total);
    document.getElementById('rangeTop').textContent=from+'–'+to+' / '+F.n(total);
    var page=Math.floor(off/lim)+1, pages=Math.max(1,Math.ceil(total/lim));
    document.getElementById('pageLbl').textContent='page '+page+' / '+pages;
    document.getElementById('prev').disabled= off<=0;
    document.getElementById('next').disabled= to>=total;
  }

  document.getElementById('filters').addEventListener('submit',function(e){
    e.preventDefault();
    state.violation_type=document.getElementById('fType').value;
    state.plate=document.getElementById('fPlate').value.trim();
    state.camera_id=document.getElementById('fCam').value.trim();
    state.min_confidence=document.getElementById('fMin').value;
    state.sort=document.getElementById('fSort').value;
    state.offset=0; syncUrl(); load();
  });
  document.getElementById('clear').addEventListener('click',function(e){
    e.preventDefault();
    state={violation_type:'',plate:'',camera_id:'',min_confidence:'',sort:'newest',offset:0};
    document.getElementById('filters').reset();
    document.getElementById('fType').value=''; document.getElementById('fSort').value='newest';
    syncUrl(); load();
  });
  document.getElementById('prev').addEventListener('click',function(){ state.offset=Math.max(0,state.offset-LIMIT); syncUrl(); load(); window.scrollTo({top:0,behavior:'smooth'}); });
  document.getElementById('next').addEventListener('click',function(){ state.offset+=LIMIT; syncUrl(); load(); window.scrollTo({top:0,behavior:'smooth'}); });

  load();
  A.motion.intro();
})();
</script>
</body>
</html>
